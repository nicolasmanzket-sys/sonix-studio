<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento recebido! - SoniX Studios</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 50%, #1a0533 100%);
            padding: 20px;
        }
        .thank-you-box {
            max-width: 480px;
            text-align: center;
            background: linear-gradient(145deg, #2a0d4a, #3d1470);
            border: 1px solid rgba(180, 100, 255, 0.35);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 0 40px rgba(140, 60, 255, 0.25), 0 20px 60px rgba(0,0,0,0.5);
        }
        .thank-you-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }
        .thank-you-box h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        .thank-you-box p {
            color: rgba(220, 190, 255, 0.85);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn-whatsapp {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 800;
            font-size: 1.05rem;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.45);
            transition: transform 0.2s ease;
        }
        .btn-whatsapp:hover {
            transform: translateY(-2px) scale(1.02);
        }
    </style>
</head>
<body>

    <section class="thank-you-section">
        <div class="thank-you-box">
            <span class="thank-you-icon">✅</span>
            <h1>Pagamento recebido!</h1>
            <p>Agora volte para o WhatsApp e envie as informações do seu pedido para começarmos sua criação.</p>
            <!-- LINK TEMPORÁRIO - SUBSTITUIR PELO NÚMERO REAL -->
            <a class="btn-whatsapp"
               href="https://wa.me/5500000000000?text=Ol%C3%A1%2C%20acabei%20de%20fazer%20o%20pagamento%20na%20SoniX%20Studios%20e%20quero%20enviar%20as%20informa%C3%A7%C3%B5es%20do%20meu%20pedido."
               target="_blank">
                Voltar para o WhatsApp
            </a>
        </div>
    </section>

</body>
</html>
