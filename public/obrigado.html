<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento recebido! - SoniX Studios</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 50%, #1a0533 100%);
            padding: 20px;
        }
        .thank-you-box {
            max-width: 480px;
            width: 100%;
            text-align: center;
            background: linear-gradient(145deg, #2a0d4a, #3d1470);
            border: 1px solid rgba(180, 100, 255, 0.35);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 0 40px rgba(140, 60, 255, 0.25), 0 20px 60px rgba(0,0,0,0.5);
        }
        .thank-you-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }
        .thank-you-box h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        .thank-you-box p {
            color: rgba(220, 190, 255, 0.85);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 0;
        }
        .order-summary {
            background: rgba(168, 85, 247, 0.12);
            border: 1px solid rgba(180, 100, 255, 0.3);
            border-radius: 16px;
            padding: 18px 20px;
            margin: 24px 0 28px;
            text-align: left;
        }
        .order-summary h2 {
            color: #fff;
            font-size: 1rem;
            margin: 0 0 10px;
            text-align: center;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 6px 0;
            color: rgba(220, 190, 255, 0.9);
            font-size: 0.92rem;
            border-bottom: 1px solid rgba(180, 100, 255, 0.15);
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .order-total {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(180, 100, 255, 0.3);
            color: #fff;
            font-weight: 800;
            font-size: 1.05rem;
        }
        .order-total strong {
            color: #d8b4fe;
        }
        .btn-whatsapp {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 800;
            font-size: 1.05rem;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.45);
            transition: transform 0.2s ease;
        }
        .btn-whatsapp:hover {
            transform: translateY(-2px) scale(1.02);
        }

        @media (max-width: 480px) {
            .thank-you-box {
                padding: 36px 20px;
            }
            .btn-whatsapp {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <section class="thank-you-section">
        <div class="thank-you-box">
            <span class="thank-you-icon">✅</span>
            <h1>Pagamento recebido!</h1>
            <p>Agora volte para o WhatsApp e envie as informações do seu pedido para começarmos sua criação.</p>

            <!-- Resumo do pedido (preenchido via JS a partir do localStorage) -->
            <div class="order-summary" id="orderSummary">
                <h2>Resumo do seu pedido</h2>
                <div id="orderItems"></div>
                <div class="order-total">
                    <span>Total:</span>
                    <strong id="orderTotal">R$ 0,00</strong>
                </div>
            </div>

            <a class="btn-whatsapp" id="btnWhatsapp"
               href="https://wa.me/5500000000000"
               target="_blank">
                Voltar para o WhatsApp
            </a>
        </div>
    </section>

    <script>
        // Número de WhatsApp da SoniX Studios - SUBSTITUIR pelo número real
        const WHATSAPP_NUMBER = "5500000000000";

        function formatPrice(value) {
            return Number(value || 0).toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            let order = null;

            try {
                order = JSON.parse(localStorage.getItem("sonix_last_order"));
            } catch (e) {
                order = null;
            }

            const orderItemsEl = document.getElementById("orderItems");
            const orderTotalEl = document.getElementById("orderTotal");
            const orderSummaryEl = document.getElementById("orderSummary");
            const btnWhatsapp = document.getElementById("btnWhatsapp");

            const products = (order && order.products) || [];
            const total = (order && order.total) || 0;
            const customer = (order && order.customer) || {};

            if (products.length === 0) {
                // Sem pedido salvo: esconde o resumo e usa mensagem padrão no WhatsApp
                orderSummaryEl.style.display = "none";
            } else {
                orderItemsEl.innerHTML = products
                    .map(
                        (item) => `
                            <div class="order-item">
                                <span>${item.name}</span>
                                <span>${formatPrice(item.price)}</span>
                            </div>
                        `
                    )
                    .join("");
                orderTotalEl.textContent = formatPrice(total);
            }

            // Monta a mensagem do WhatsApp
            let message = "Olá, acabei de fazer o pagamento na SoniX Studios.\n\n";

            if (products.length > 0) {
                message += "Meu pedido:\n";
                products.forEach((item) => {
                    message += `- ${item.name}\n`;
                });
                message += `\nTotal: ${formatPrice(total)}\n\n`;
            }

            if (customer.name) message += `Nome: ${customer.name}\n`;
            if (customer.whatsapp) message += `WhatsApp: ${customer.whatsapp}\n`;
            if (customer.email) message += `E-mail: ${customer.email}\n`;

            message += "\nQuero enviar as informações do meu pedido.";

            btnWhatsapp.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
        });
    </script>

</body>
</html>
